<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공구모아 — 5월 공동구매 일정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BBSL0JLGEH"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-BBSL0JLGEH');
</script>
<style>
:root{--bg:#f5f3ef;--ink:#1c1a17;--ink2:#6b6457;--ink3:#b0a898;--border:#e8e3dc;--surface:#fff;--surface2:#f3efe9;--navy:#2d3a5a;--navy-dark:#1e2740;--accent:#e8450a;--accent-light:#fdf0eb;--pink:#e84578;--pink-light:#fdeef4;--blue:#2563eb;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
header{background:var(--navy);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-ring{width:40px;height:40px;border-radius:50%;background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);padding:2.5px;flex-shrink:0}
.logo-inner{width:100%;height:100%;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-direction:column;line-height:1}
.logo-inner span{font-weight:900;font-size:10px;color:#fff;display:block}
.logo-text{font-weight:900;font-size:18px;color:#fff;letter-spacing:-.5px}
.live-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.45)}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero{background:var(--navy-dark);padding:.6rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.hero-text{font-size:13px;font-weight:500;color:rgba(255,255,255,.8)}
.inquiry-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);border-radius:20px;color:#fff;font-size:12px;font-weight:500;text-decoration:none;white-space:nowrap;font-family:"Noto Sans KR",sans-serif;transition:background .15s}
.inquiry-btn:hover{background:rgba(255,255,255,.22)}
main{max-width:1080px;margin:0 auto;padding:1.5rem 1.25rem 5rem}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem}
.stat{background:var(--surface);padding:.875rem 1rem}
.stat-n{font-size:26px;font-weight:900;color:var(--ink);line-height:1}
.stat-l{font-size:11px;color:var(--ink3);margin-top:3px}
.stat-clickable{cursor:pointer;transition:background .15s}
.stat-clickable:hover{background:#f0f4ff}
.controls{margin-bottom:1.1rem;display:flex;flex-direction:column;gap:9px}
.search-box{position:relative}
.search-box input{width:100%;padding:9px 14px 9px 38px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:"Noto Sans KR",sans-serif;background:var(--surface);color:var(--ink);outline:none;transition:border-color .15s}
.search-box input:focus{border-color:var(--navy)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:12px;color:var(--ink2);font-weight:500}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-family:"Noto Sans KR",sans-serif;color:var(--ink2);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--ink3)}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.tabs{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:1.25rem}
.tab{padding:9px 20px;font-size:14px;font-family:"Noto Sans KR",sans-serif;color:var(--ink3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1.5px;display:flex;align-items:center;gap:6px;transition:all .15s}
.tab:hover{color:var(--ink2)}
.tab.on{color:var(--navy);border-bottom-color:var(--navy);font-weight:500}
.view{display:none}
.view.on{display:block}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surface2)}
th{text-align:left;padding:9px 14px;font-size:11px;font-weight:500;color:var(--ink3);border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:.4px;text-transform:uppercase}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);color:var(--ink);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s;cursor:pointer}
tbody tr:hover{background:var(--bg)}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap}
.tag-성인{background:#dbeafe;color:#1e40af}
.tag-육아{background:#fce7f3;color:#9d174d}
.tag-생활{background:#e0e7ff;color:#3730a3}
.tag-가전{background:#fef3c7;color:#92400e}
.tag-건강{background:#d1fae5;color:#065f46}
.tag-식품{background:#ffedd5;color:#9a3412}
.tag-뷰티{background:#fdf2f8;color:#be185d}
.tag-패션{background:#f5f3ff;color:#6d28d9}
.tag-책{background:#ecfdf5;color:#065f46}
.tag-교육{background:#eff6ff;color:#1d4ed8}
.tag-교구{background:#fff7ed;color:#c2410c}
.tag-장난감{background:#fef2f2;color:#b91c1c}
.tag-가구{background:#f0fdf4;color:#15803d}
.tag-여행{background:#ecfeff;color:#0e7490}
.tag-기타{background:#f3f4f6;color:#4b5563}
.card-row1{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:nowrap}
.card-date{font-size:12px;font-weight:600;color:var(--ink2);margin-left:auto;white-space:nowrap}
.card-date.today{color:var(--accent)}
.card-date.soon{color:var(--pink)}
.dday-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;white-space:nowrap}
.ended-badge{background:var(--surface2);color:var(--ink3)}
.today-badge{background:var(--accent-light);color:var(--accent)}
.soon-badge{background:var(--pink-light);color:var(--pink)}
.card-row2{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-row2 .item-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-inf{font-size:12px;color:var(--ink2);white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:3px}
tr.ended td{color:var(--ink3)!important}
tr.ended .item-name{color:var(--ink3)}
tr.ended .tag{opacity:.45}
tr.ended{background:#faf9f7}
.no-data{text-align:center;padding:4rem 2rem;color:var(--ink3)}
.no-data .icon{font-size:32px;margin-bottom:.5rem}
.cal-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.4rem;border-bottom:1px solid var(--border)}
.cal-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.cal-nav{display:flex;gap:6px}
.cal-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.cal-btn:hover{background:var(--surface2)}
.cal-today-btn{padding:0 12px;height:32px;border:1px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;font-size:12px;font-family:"Noto Sans KR",sans-serif;color:var(--ink2)}
.cal-today-btn:hover{background:var(--surface2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;padding:.6rem 0;font-size:11px;font-weight:500;color:var(--ink3);border-bottom:1px solid var(--border);letter-spacing:.4px}
.cal-dow:first-child{color:var(--accent)}
.cal-dow:last-child{color:var(--blue)}
.cal-cell{min-height:90px;padding:.45rem .5rem;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--bg)}
.cal-cell.other{opacity:.35}
.cal-cell.today{background:#f0f4ff}
.cal-dn{font-size:13px;font-weight:500;color:var(--ink2);margin-bottom:3px}
.cal-cell.today .cal-dn{color:var(--navy);font-weight:700}
.cal-cell.sun .cal-dn{color:var(--accent)}
.cal-cell.sat .cal-dn{color:var(--blue)}
.cal-ev{font-size:10px;line-height:1.4;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:opacity .1s}
.cal-ev:hover{opacity:.8}
.ev-가전{background:#fef3c7;color:#92400e}
.ev-건강{background:#d1fae5;color:#065f46}
.ev-식품{background:#ffedd5;color:#9a3412}
.ev-뷰티{background:#fdf2f8;color:#be185d}
.ev-생활{background:#e0e7ff;color:#3730a3}
.ev-패션{background:#f5f3ff;color:#6d28d9}
.ev-책{background:#ecfdf5;color:#065f46}
.ev-교육{background:#eff6ff;color:#1d4ed8}
.ev-교구{background:#fff7ed;color:#c2410c}
.ev-장난감{background:#fef2f2;color:#b91c1c}
.ev-가구{background:#f0fdf4;color:#15803d}
.ev-여행{background:#ecfeff;color:#0e7490}
.ev-기타{background:#f3f4f6;color:#4b5563}
.ev-default{background:var(--surface2);color:var(--ink2)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:1.75rem;width:min(420px,calc(100vw - 2rem));position:relative;animation:pop .2s ease}
@keyframes pop{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.modal-x{position:absolute;top:14px;right:14px;background:var(--surface2);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;color:var(--ink2);display:flex;align-items:center;justify-content:center}
.modal-tags{display:flex;gap:6px;margin-bottom:.75rem;flex-wrap:wrap}
.modal-title{font-size:18px;font-weight:700;margin-bottom:.5rem;line-height:1.3}
.modal-meta{font-size:13px;color:var(--ink2);margin-bottom:1.25rem;line-height:1.8}
.modal-insta{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:.7rem;background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);color:#fff;text-align:center;border-radius:10px;text-decoration:none;font-size:14px;font-weight:500;margin-bottom:8px;transition:opacity .15s}
.modal-insta:hover{opacity:.88}
.modal-link{display:block;width:100%;padding:.7rem;background:var(--navy);color:#fff;text-align:center;border-radius:10px;text-decoration:none;font-size:14px;font-weight:500;transition:opacity .15s}
.modal-link:hover{opacity:.85}
.modal-link.disabled{background:var(--surface2);color:var(--ink3);pointer-events:none}
.day-item{display:flex;align-items:center;gap:8px;padding:.65rem 0;border-bottom:.5px solid var(--border);cursor:pointer}
.day-item:last-child{border-bottom:none}
.day-item:hover{opacity:.75}
.day-item-tags{display:flex;gap:4px;flex-shrink:0}
.day-item-name{font-size:13px;font-weight:500;flex:1}
.day-item-inf{font-size:11px;color:var(--ink3);white-space:nowrap;display:flex;align-items:center;gap:3px}

/* 배너 */
.banner-slide{flex:0 0 100%;display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.1rem;min-height:64px;text-decoration:none;position:relative;border-radius:var(--radius);cursor:pointer;transition:opacity .15s}
.banner-slide:hover{opacity:.92}
.banner-msg{font-size:14px;font-weight:600;color:var(--ink);flex:1;line-height:1.4}
.banner-cta{font-size:12px;font-weight:500;color:var(--ink2);white-space:nowrap;margin-left:12px;text-decoration:underline;flex-shrink:0}
.banner-dot-item{width:5px;height:5px;border-radius:50%;background:var(--border);transition:all .2s;cursor:pointer;border:none;padding:0}
.banner-dot-item.on{background:var(--navy);width:14px;border-radius:3px}
@media(max-width:640px){
  main{padding:.75rem .75rem 4rem}
  header{padding:0 1rem;height:50px}
  .logo-ring{width:34px;height:34px}
  .logo-inner span{font-size:9px}
  .logo-text{font-size:16px}
  .hero{padding:.5rem 1rem}
  .hero-text{font-size:12px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat-n{font-size:22px}
  .filter-row{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filter-row::-webkit-scrollbar{display:none}
  .filter-label{font-size:11px;flex-shrink:0}
  .chip{font-size:12px;padding:5px 11px;flex-shrink:0}
  .tab{padding:8px 14px;font-size:13px}
  .table-wrap{border:none;background:none;border-radius:0}
  table,thead,tbody,th,td,tr{display:block}
  thead{display:none}
  tbody tr{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;padding:.75rem 1rem}
  tbody tr td{padding:0;border:none}
  .cal-container{overflow:hidden}
  .cal-grid{grid-template-columns:repeat(7,minmax(0,1fr))}
  .cal-cell{min-height:68px;padding:.3rem .3rem}
  .cal-dn{font-size:11px}
  .cal-ev{font-size:9px;padding:1px 3px}
  .cal-header{padding:.9rem 1rem}
  .cal-title{font-size:15px}
  .inquiry-btn{font-size:11px;padding:4px 9px}
  #v-cal{overflow-x:auto;-webkit-overflow-scrolling:touch}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-ring"><div class="logo-inner"><span>공구</span><span>모아</span></div></div>
    <div class="logo-text">공구모아</div>
  </div>
  <div class="live-badge"><span class="live-dot"></span><span id="updatedAt">최신 데이터</span></div>
</header>

<div class="hero">
  <div class="hero-text">&#128230; 5월 공동구매 일정 모음</div>
  <a class="inquiry-btn" href="https://open.kakao.com/o/seSpyssi" target="_blank" rel="noopener">&#128140; 제휴·광고 문의</a>
</div>

<main>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">전체 공구</div></div>
    <div class="stat stat-clickable" onclick="setTodayFilter()">
      <div class="stat-n" id="s-today" style="color:var(--navy)">—</div>
      <div class="stat-l">&#128293; 오늘 오픈</div>
    </div>
    <div class="stat"><div class="stat-n" id="s-week">—</div><div class="stat-l">이번 주</div></div>
    <div class="stat"><div class="stat-n" id="s-cats">—</div><div class="stat-l">카테고리</div></div>
  </div>

  <div class="controls">
    <div class="search-box">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="q" placeholder="품목명, 인플루언서, 아이디 검색..." oninput="render()">
    </div>
    <div class="filter-row">
      <span class="filter-label">오늘</span>
      <button class="chip" id="todayChip" onclick="toggleToday(this)" style="border-color:var(--navy);color:var(--navy)">&#128293; 오늘 오픈만 보기</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">대분류</span>
      <button class="chip cat-chip on" onclick="setCat('전체',this)">전체</button>
      <button class="chip cat-chip" onclick="setCat('성인',this)">성인</button>
      <button class="chip cat-chip" onclick="setCat('육아',this)">육아</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">소분류</span>
      <button class="chip sub-chip on" onclick="setSub('전체',this)">전체</button>
      <button class="chip sub-chip" onclick="setSub('가전',this)">가전</button>
      <button class="chip sub-chip" onclick="setSub('건강',this)">건강</button>
      <button class="chip sub-chip" onclick="setSub('식품',this)">식품</button>
      <button class="chip sub-chip" onclick="setSub('뷰티',this)">뷰티</button>
      <button class="chip sub-chip" onclick="setSub('생활',this)">생활</button>
      <button class="chip sub-chip" onclick="setSub('패션',this)">패션</button>
      <button class="chip sub-chip" onclick="setSub('책',this)">책</button>
      <button class="chip sub-chip" onclick="setSub('교육',this)">교육</button>
      <button class="chip sub-chip" onclick="setSub('교구',this)">교구</button>
      <button class="chip sub-chip" onclick="setSub('장난감',this)">장난감</button>
      <button class="chip sub-chip" onclick="setSub('가구',this)">가구</button>
      <button class="chip sub-chip" onclick="setSub('여행',this)">여행</button>
      <button class="chip sub-chip" onclick="setSub('기타',this)">기타</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="switchTab('list',this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      리스트
    </button>
    <button class="tab" onclick="switchTab('cal',this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      캘린더
    </button>
  </div>

  <!-- 배너 슬라이더 -->
  <div id="bannerArea" style="display:none;margin-bottom:1rem">
    <div style="overflow:hidden;border-radius:var(--radius);position:relative" id="bannerOuter">
      <div id="bannerTrack" style="display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1)"></div>
    </div>
    <div id="bannerDots" style="display:flex;justify-content:center;gap:5px;padding:6px 0"></div>
  </div>

  <div id="v-list" class="view on">
    <div class="table-wrap">
      <table><thead><tr><th>공구 일정</th></tr></thead>
      <tbody id="tbody"></tbody></table>
    </div>
  </div>

  <div id="v-cal" class="view">
    <div class="cal-container">
      <div class="cal-header">
        <div class="cal-title" id="calTitle"></div>
        <div class="cal-nav">
          <button class="cal-btn" onclick="calMove(-1)">&#9664;</button>
          <button class="cal-today-btn" onclick="calReset()">오늘</button>
          <button class="cal-btn" onclick="calMove(1)">&#9654;</button>
        </div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>
</main>

<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()">&#10005;</button>
    <div class="modal-tags" id="m-tags"></div>
    <div class="modal-title" id="m-title"></div>
    <div class="modal-meta" id="m-meta"></div>
    <a class="modal-insta" id="m-insta" target="_blank" rel="noopener" style="display:none"></a>
    <a class="modal-link" id="m-link" target="_blank" rel="noopener"></a>
  </div>
</div>

<div class="modal-bg" id="dayModal" onclick="closeDayModal(event)">
  <div class="modal" style="max-height:80vh;overflow-y:auto">
    <button class="modal-x" onclick="closeDayModal()">&#10005;</button>
    <div class="modal-title" id="day-title" style="margin-bottom:1rem"></div>
    <div id="day-list"></div>
  </div>

  if(!rows.length){tb.innerHTML='<tr><td><div class="no-data"><div class="icon">&#128269;</div>&#44160;&#49353; &#44208;&#44284;&#44032; &#50630;&#50612;&#50836;</div></td></tr>';return;}
  var html='';
  for(var i=0;i<rows.length;i++) {
    var d=rows[i];
    var dt=pd(d.date), ended=isEnded(d);
    var dd=(!ended&&dt)?dday(dt):'';
    var isT=dt&&dt.getTime()===TODAY.getTime();
    var isS=dt&&!isT&&(dt-TODAY)/86400000<=3&&dt>=TODAY;
    var ds=dt?(dt.getMonth()+1)+'/'+(dt.getDate()):(d.date||'—');
    var iid=d.insta?d.insta.replace('@',''):'';
    var ddh=ended?'<span class="dday-badge ended-badge">&#51333;&#47308;</span>'
      :(dd?('<span class="dday-badge '+(isT?'today-badge':isS?'soon-badge':'')+'">'+(dd)+'</span>'):'');
    var infh=iid?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>'+(d.inf||'—'):(d.inf||'—');
    html+='<tr data-idx="'+i+'" class="'+(ended?'ended':'')+'">'
      +'<td><div class="card-row1">'
      +'<span class="tag tag-'+(d.cat||'기타')+'">'+(d.cat||'—')+'</span>'
      +(d.sub?'<span class="tag tag-'+d.sub+'">'+d.sub+'</span>':'')
      +'<span class="card-date'+(isT?' today':isS?' soon':'')+'">&thinsp;'+ds+'</span>'+ddh
      +'</div><div class="card-row2"><span class="item-name">'+(d.name||'—')+'</span>'
      +'<span class="card-inf">'+infh+'</span></div></td></tr>';
  }
  tb.innerHTML=html;
  var trs=tb.querySelectorAll('tr');
  for(var j=0;j<trs.length;j++) {
    (function(row,item){row.onclick=function(){openModal(item);};})(trs[j],rows[j]);
  }
}
function fmtISO(dt) {
  return dt.getFullYear()+'-'+(''+(dt.getMonth()+1)).padStart(2,'0')+'-'+(''+(dt.getDate())).padStart(2,'0');
}
function renderCal() {
  var mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent=calY+'년 '+mn[calM];
  var grid=document.getElementById('calGrid');
  grid.innerHTML='';
  ['일','월','화','수','목','금','토'].forEach(function(d){var el=document.createElement('div');el.className='cal-dow';el.textContent=d;grid.appendChild(el);});
  var fd=new Date(calY,calM,1).getDay(), dim=new Date(calY,calM+1,0).getDate(), pd2=new Date(calY,calM,0).getDate();
  for(var i=fd-1;i>=0;i--) grid.appendChild(mkCell(new Date(calY,calM-1,pd2-i),true));
  for(var d2=1;d2<=dim;d2++) grid.appendChild(mkCell(new Date(calY,calM,d2),false));
  var tail=(fd+dim)%7===0?0:7-(fd+dim)%7;
  for(var d3=1;d3<=tail;d3++) grid.appendChild(mkCell(new Date(calY,calM+1,d3),true));
}
function mkCell(dt,other) {
  var cell=document.createElement('div');
  var dow=dt.getDay(), isT=dt.getTime()===TODAY.getTime();
  cell.className='cal-cell'+(other?' other':'')+(isT?' today':'')+(dow===0?' sun':dow===6?' sat':'');
  var dn=document.createElement('div');dn.className='cal-dn';dn.textContent=dt.getDate();cell.appendChild(dn);
  var iso=fmtISO(dt);
  var evts=DATA.filter(function(d){var dp=pd(d.date);return dp&&fmtISO(dp)===iso;});
  evts.slice(0,3).forEach(function(d){
    var ev=document.createElement('div');ev.className='cal-ev ev-'+(d.sub||'default');ev.textContent=d.name;
    (function(item){ev.onclick=function(e){e.stopPropagation();openModal(item);};})(d);
    cell.appendChild(ev);
  });
  if(evts.length>3){
    var m=document.createElement('div');m.className='cal-ev ev-default';m.textContent='+'+(evts.length-3)+'개';
    (function(arr,date){m.onclick=function(e){e.stopPropagation();openDayPopup(date,arr);};})(evts,dt);
    cell.appendChild(m);
  }
  (function(arr,date){cell.onclick=function(){if(arr.length>0)openDayPopup(date,arr);};})(evts,dt);
  return cell;
}
function calMove(d){calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderCal();}
function calReset(){calY=TODAY.getFullYear();calM=TODAY.getMonth();renderCal();}
function openDayPopup(dt,evts) {
  var mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('day-title').textContent=mn[dt.getMonth()]+' '+dt.getDate()+'일 공구 ('+evts.length+'건)';
  var html='';
  for(var i=0;i<evts.length;i++) {
    var d=evts[i], iid=d.insta?d.insta.replace('@',''):'';
    html+='<div class="day-item" data-idx="'+i+'">'
      +'<div class="day-item-tags"><span class="tag tag-'+(d.cat||'기타')+'" style="font-size:10px;padding:1px 5px">'+(d.cat||'')+'</span>'
      +(d.sub?'<span class="tag tag-'+d.sub+'" style="font-size:10px;padding:1px 5px">'+d.sub+'</span>':'')
      +'</div><div class="day-item-name">'+(d.name)+'</div>'
      +'<div class="day-item-inf">'+(iid?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg> ':'')+d.inf+'</div></div>';
  }
  document.getElementById('day-list').innerHTML=html;
  var items=document.getElementById('day-list').querySelectorAll('.day-item');
  for(var j=0;j<items.length;j++) {
    (function(el,item){el.onclick=function(){closeDayModal();openModal(item);};})(items[j],evts[j]);
  }
  document.getElementById('dayModal').classList.add('open');
}
function closeDayModal(e){if(!e||e.target===document.getElementById('dayModal'))document.getElementById('dayModal').classList.remove('open');}
function openModal(d) {
  var dt=pd(d.date), dateStr=dt?(dt.getMonth()+1)+'월 '+dt.getDate()+'일':(d.date||'');
  var iid=d.insta?d.insta.replace('@',''):'';
  document.getElementById('m-tags').innerHTML='<span class="tag tag-'+(d.cat||'기타')+'">'+(d.cat||'')+'</span>'+(d.sub?'<span class="tag tag-'+d.sub+'">'+d.sub+'</span>':'');
  document.getElementById('m-title').textContent=d.name;
  document.getElementById('m-meta').innerHTML='<span style="font-size:13px;color:var(--ink2)">&#128197; '+dateStr+'&nbsp;&nbsp;&#183;&nbsp;&nbsp;&#128100; '+(d.inf||'—')+'</span>';
  var ib=document.getElementById('m-insta');
  if(iid){ib.href='https://www.instagram.com/'+iid;ib.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg> @'+iid+' &#51064;&#49828;&#53440; &#48148;&#47196;&#44032;&#44592;';ib.style.display='flex';}
  else{ib.style.display='none';}
  var lk=document.getElementById('m-link');
  if(d.url&&d.url!==''){lk.href=d.url;lk.textContent='&#44277;&#44396; &#54168;&#51060;&#51648; &#48148;&#47196;&#44032;&#44592; &#8594;';lk.classList.remove('disabled');}
  else{lk.href='#';lk.textContent='&#47553;&#53356; &#50630;&#51020;';lk.classList.add('disabled');}
  document.getElementById('modal').classList.add('open');
}
function closeModal(e){if(!e||e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');}
function switchTab(v,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.view').forEach(function(el){el.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById('v-'+v).classList.add('on');
  if(v==='cal')renderCal();
}

// ── 배너 슬라이더 ──
var BANNER_SHEET_ID = '1tWGFkWJrVxxu8ezJ9qRqCzMNxZoLgaDI8tiWUV8Rb78';
var BANNER_GID = '902874268';
var bannerList = [], bannerIdx = 0, bannerTimer = null, bannerTouchX = 0;

// 배너 색상 팔레트 (튀지 않는 톤)
var BANNER_COLORS = [
  {bg:'#EEF2F7', border:'#D0DAE8', text:'#2d3a5a'},
  {bg:'#F0F5EE', border:'#C8DCC4', text:'#2a4a28'},
  {bg:'#F5F0EE', border:'#DDD0C8', text:'#4a2a2a'},
  {bg:'#EEF0F5', border:'#C8CCD8', text:'#2a2e4a'},
  {bg:'#F5EEF5', border:'#D8C8D8', text:'#4a2a4a'},
  {bg:'#F5F3EE', border:'#D8D0C0', text:'#4a3a1a'},
];

function buildBanners(list) {
  var track = document.getElementById('bannerTrack');
  var dots  = document.getElementById('bannerDots');
  var area  = document.getElementById('bannerArea');
  if (!list.length) { area.style.display = 'none'; return; }
  area.style.display = 'block';
  track.innerHTML = ''; dots.innerHTML = '';

  list.forEach(function(b, i) {
    var col = BANNER_COLORS[i % BANNER_COLORS.length];
    var a = document.createElement('a');
    a.className = 'banner-slide';
    a.href = b.url || '#';
    a.target = '_blank';
    a.rel = 'noopener';
    a.style.background = col.bg;
    a.style.border = '1px solid ' + col.border;
    a.innerHTML = '<div class="banner-msg" style="color:'+col.text+'">'+b.msg+'</div>'
      + '<div class="banner-cta" style="color:'+col.text+'">자세히 보기 &#8594;</div>'
      + '<span style="position:absolute;top:5px;right:6px;font-size:8px;color:rgba(0,0,0,.25);background:rgba(0,0,0,.07);border-radius:3px;padding:1px 4px">AD</span>';
    track.appendChild(a);

    var dot = document.createElement('button');
    dot.className = 'banner-dot-item' + (i===0?' on':'');
    (function(idx){ dot.onclick = function(){ bannerGoTo(idx); }; })(i);
    dots.appendChild(dot);
  });

  // 스와이프
  var outer = document.getElementById('bannerOuter');
  outer.addEventListener('touchstart', function(e){ bannerTouchX = e.touches[0].clientX; }, {passive:true});
  outer.addEventListener('touchend', function(e){
    var diff = bannerTouchX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) { if (diff > 0) bannerNext(); else bannerPrev(); }
  }, {passive:true});
  var md = false, mx = 0;
  outer.addEventListener('mousedown', function(e){ md=true; mx=e.clientX; bannerTouchX=e.clientX; });
  outer.addEventListener('mouseup', function(e){
    if(!md) return; md=false;
    var diff = mx - e.clientX;
    if(Math.abs(diff)>40){ if(diff>0) bannerNext(); else bannerPrev(); }
  });

  bannerGoTo(0);
}

function bannerGoTo(i) {
  bannerIdx = (i + bannerList.length) % bannerList.length;
  document.getElementById('bannerTrack').style.transform = 'translateX(-'+(bannerIdx*100)+'%)';
  document.querySelectorAll('.banner-dot-item').forEach(function(d,j){ d.classList.toggle('on', j===bannerIdx); });
  clearInterval(bannerTimer);
  if (bannerList.length > 1) bannerTimer = setInterval(bannerNext, 4000);
}
function bannerNext(){ bannerGoTo(bannerIdx+1); }
function bannerPrev(){ bannerGoTo(bannerIdx-1); }

function loadBannerSheet() {
  if (!BANNER_SHEET_ID) return;
  var todayStr = TODAY.getFullYear()+'-'+(''+(TODAY.getMonth()+1)).padStart(2,'0')+'-'+(''+(TODAY.getDate())).padStart(2,'0');
  var url = 'https://docs.google.com/spreadsheets/d/'+BANNER_SHEET_ID+'/gviz/tq?tqx=out:json&gid='+BANNER_GID;
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(text){
      var json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      var rows = json.table.rows;
      var cols = json.table.cols.map(function(c){ return c.label; });
      var iMsg=-1, iUrl=-1, iStart=-1, iEnd=-1;
      cols.forEach(function(c,i){
        if(c.indexOf('멘트')>-1||c.indexOf('문구')>-1) iMsg=i;
        else if(c.indexOf('링크')>-1||c.indexOf('URL')>-1) iUrl=i;
        else if(c.indexOf('시작')>-1) iStart=i;
        else if(c.indexOf('종료')>-1||c.indexOf('마감')>-1) iEnd=i;
      });
      var active = [];
      rows.forEach(function(row){
        var get = function(idx){ return idx>-1&&row.c[idx]?String(row.c[idx].v||row.c[idx].f||'').trim():''; };
        var start = get(iStart).replace(/\//g,'-').substring(0,10);
        var end   = get(iEnd).replace(/\//g,'-').substring(0,10);
        if (start && end && start <= todayStr && todayStr <= end) {
          active.push({ msg: get(iMsg), url: get(iUrl) });
        }
      });
      // 랜덤 섞기
      for(var i=active.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=active[i]; active[i]=active[j]; active[j]=t; }
      bannerList = active;
      buildBanners(bannerList);
    })
    .catch(function(){ });
}

loadBannerSheet();
var FORM_SHEET_ID = '1o95J316riKjHtHC2d_4qI7Qj3qYc5ezbLaonGtm2aL8';
var FORM_GID = '1388619433';

function parseFormDate(val) {
  if (!val) return '';
  // "2026/06/01" 또는 "2026-06-01" 형식
  var m = String(val).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) return m[1]+'-'+(m[2].length===1?'0':'')+m[2]+'-'+(m[3].length===1?'0':'')+m[3];
  // "6월 1일" 형식
  var m2 = String(val).match(/(\d{1,2})월\s*(\d{1,2})일/);
  if (m2) return '2026-'+(m2[1].length===1?'0':'')+m2[1]+'-'+(m2[2].length===1?'0':'')+m2[2];
  return '';
}

function loadFormData() {
  var url = 'https://docs.google.com/spreadsheets/d/'+FORM_SHEET_ID+'/gviz/tq?tqx=out:json&gid='+FORM_GID;
  fetch(url)
    .then(function(r){return r.text();})
    .then(function(text){
      var json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      var rows = json.table.rows;
      var cols = json.table.cols.map(function(c){return c.label;});

      // 컬럼 인덱스 찾기
      // 폼 컬럼: 타임스탬프, 대분류, 소분류, 오픈날짜, 마감날짜, 공구제품명, 인플루언서이름, 인스타그램아이디
      var idxCat=-1, idxSub=-1, idxStart=-1, idxEnd=-1, idxName=-1, idxInf=-1, idxInsta=-1;
      cols.forEach(function(c,i){
        if(c.indexOf('대분류')>-1) idxCat=i;
        else if(c.indexOf('소분류')>-1) idxSub=i;
        else if(c.indexOf('오픈')>-1||c.indexOf('시작')>-1) idxStart=i;
        else if(c.indexOf('마감')>-1||c.indexOf('종료')>-1) idxEnd=i;
        else if(c.indexOf('제품명')>-1||c.indexOf('품목')>-1) idxName=i;
        else if(c.indexOf('인플루언서')>-1) idxInf=i;
        else if(c.indexOf('인스타')>-1) idxInsta=i;
      });

      var formItems = [];
      rows.forEach(function(row, ri){
        var get = function(idx){ return idx>-1&&row.c[idx]?String(row.c[idx].v||row.c[idx].f||'').trim():''; };
        var name = get(idxName);
        if(!name) return;
        formItems.push({
          id: 'form_'+ri,
          cat: get(idxCat)||'성인',
          sub: get(idxSub)||'기타',
          date: parseFormDate(get(idxStart)),
          end_date: parseFormDate(get(idxEnd)),
          name: name,
          inf: get(idxInf),
          insta: get(idxInsta).replace('@',''),
          url: '',
          source: 'form'
        });
      });

      if(formItems.length > 0) {
        // 기존 form 데이터 제거 후 새로 추가
        DATA = DATA.filter(function(d){return d.source !== 'form';});
        DATA = DATA.concat(formItems);
        document.getElementById('updatedAt').textContent = '최신 데이터 (폼 '+formItems.length+'건 포함)';
        render(); renderCal();
        console.log('구글 폼 데이터 '+formItems.length+'건 로드 완료');
      }
    })
    .catch(function(e){
      console.log('폼 데이터 로드 실패:', e);
    });
}

render();
renderCal();
loadFormData();
